name: Build HavaPuls APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu İndir
        uses: actions/checkout@v4

      - name: Java 17 Kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK Kur
        uses: android-actions/setup-android@v3

      - name: Android Platform ve Build Tools Kur
        run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Gradle 8.7 Kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Uygulama İkonlarını İndir
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          curl -sL "https://alphyn12.github.io/havapuls/icons/icon-72.png"  -o android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          curl -sL "https://alphyn12.github.io/havapuls/icons/icon-96.png"  -o android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          curl -sL "https://alphyn12.github.io/havapuls/icons/icon-144.png" -o android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          curl -sL "https://alphyn12.github.io/havapuls/icons/icon-192.png" -o android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png

      - name: APK Derle
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: APK'yı Yeniden Adlandır
        run: cp android/app/build/outputs/apk/debug/app-debug.apk HavaPuls.apk

      - name: Release Güncelle ve APK Ekle
        run: |
          gh release delete apk-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create apk-latest HavaPuls.apk \
            --title "HavaPuls APK" \
            --notes "Android 5.0+ tüm cihazlara kurulabilir. **HavaPuls.apk** dosyasına tıklayarak indir." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
